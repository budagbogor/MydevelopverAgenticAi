agents:
  - id: queen
    role: "Project Manager & Architect"
    model: "gemini/gemini-2.5-pro"
    capabilities:
      - task_decomposition
      - strategy_planning
      - conflict_resolution
      - consensus_gathering
    description: "The central intelligence of the swarm. Decomposes user requests into milestones and delegates tasks to specialists."

  - id: coder_trae
    role: "Senior Fullstack Developer (Trae Expert)"
    model: "claude-haiku-4-5"
    capabilities:
      - code_generation
      - gui_interaction
      - trae_integration
    description: "Specializes in interacting with the Trae IDE GUI to generate high-quality code and UI components."

  - id: terminal_bot
    role: "System & Terminal Operator"
    model: "gemini/gemini-2.5-flash"
    capabilities:
      - shell_execution
      - npm_management
      - git_operations
      - deployment_triggers
    description: "Executor for terminal commands such as npm install, running dev server, and pushing to GitHub."

  - id: browser_bot
    role: "QA & visual Verifier"
    model: "gemini/gemini-2.5-flash"
    capabilities:
      - url_opening
      - visual_screenshot
      - end_to_end_verification
    description: "Opens the locally running project in a browser and takes a screenshot for final confirmation."

  - id: search_bot
    role: "Documentation & Web Researcher"
    model: "gemini/gemini-2.5-flash"
    capabilities:
      - web_search
      - documentation_parsing
    description: "Responsible for finding technical documentation, solving bugs via research, and providing context for new technologies."

  - id: security_auditor
    role: "Cybersecurity & Code Quality Reviewer"
    model: "deepseek-r1"
    capabilities:
      - security_audit
      - linting
      - bug_detection
    description: "Reviews the generated code for security vulnerabilities and logical errors before final approval."

  - id: ux_ui_designer
    role: "Visual & Experience Architect"
    model: "gemini/gemini-2.5-flash"
    capabilities:
      - design_mockup
      - theme_selection
      - responsive_layout_design
    description: "Ensures the application is aesthetically pleasing, high-contrast, and follows modern UI trends like Bento or Glassmorphism."

  - id: devops_quality
    role: "Deployment & Quality Engineer"
    model: "gemini/gemini-2.5-flash"
    capabilities:
      - linter_execution
      - formatter_trigger
      - ci_cd_scaffolding
    description: "Responsible for code formatting, directory structure integrity, and ensuring the project is production-ready."
